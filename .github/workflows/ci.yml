# CI 게이트: 깨끗한 환경에서 lint → typecheck → test → build 를 재현한다.
# 로컬에서만 통과하는 코드를 거르는 것이 목적이다.
# main push는 검사 통과 후 같은 파이프라인에서 GitHub Pages로 배포한다
# (확정 설계 real-data-deploy.md — "검사 통과 후 배포"를 워크플로우 구조로 보장).
# (React + Vite + TypeScript)
# CI 트리거 재활성화 (2026-07-02).
name: CI

on:
  pull_request:
  push:
    branches: [main]
  workflow_run:
    workflows: [Update lotto data]
    types: [completed]

jobs:
  check:
    if: github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck
      - run: npm test
      - run: npm run build

  deploy:
    if: >-
      (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
      (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success')
    needs: check
    runs-on: ubuntu-latest
    permissions:
      # job 단위 permissions는 명시하지 않은 권한을 전부 끄므로 checkout용 읽기를 함께 준다.
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist
      - id: deployment
        uses: actions/deploy-pages@v4
