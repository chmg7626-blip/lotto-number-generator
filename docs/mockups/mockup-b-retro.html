<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>초안 B · 복고 파스텔</title>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Jua&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --cream: #fbf1e2;
        --cream2: #fff8ee;
        --card: #fffdf8;
        --line: #e7d9c2;
        --ink: #4a3f33;
        --dim: #9a8c77;
        --coral: #ff8b7b;
        --coral2: #f26b58;
        --mint: #7fd1c1;
        --lemon: #ffd36e;
        --z1: #ffd36e;
        --z2: #8fcfe8;
        --z3: #ff9e9e;
        --z4: #c9bba6;
        --z5: #aedb8e;
      }
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      body {
        font-family: 'Pretendard', sans-serif;
        color: var(--ink);
        line-height: 1.6;
        background: var(--cream);
        background-image: radial-gradient(var(--line) 1.2px, transparent 1.2px);
        background-size: 22px 22px;
      }
      .jua {
        font-family: 'Jua', sans-serif;
      }

      .disc {
        display: flex;
        gap: 8px;
        align-items: center;
        justify-content: center;
        background: var(--coral);
        color: #fff;
        font-size: 12.5px;
        padding: 9px 18px;
      }
      .disc b {
        font-weight: 700;
      }

      .hero {
        text-align: center;
        padding: 50px 20px 20px;
        max-width: 760px;
        margin: 0 auto;
      }
      .badge {
        display: inline-block;
        font-family: 'Jua', sans-serif;
        font-size: 13px;
        color: var(--coral2);
        background: #fff;
        border: 2px dashed var(--coral);
        border-radius: 999px;
        padding: 6px 18px;
        margin-bottom: 18px;
      }
      .htitle {
        font-family: 'Jua', sans-serif;
        font-size: 56px;
        line-height: 1.1;
        color: var(--ink);
      }
      .htitle .n {
        color: var(--coral2);
      }
      .hsub {
        color: var(--dim);
        font-size: 16px;
        margin-top: 10px;
      }

      .card {
        background: var(--card);
        border: 2px solid var(--line);
        border-radius: 26px;
        box-shadow: 6px 8px 0 rgba(231, 217, 194, 0.55);
        padding: 28px 26px;
        max-width: 760px;
        margin: 26px auto 0;
      }
      .modechips {
        display: flex;
        gap: 10px;
        justify-content: center;
        flex-wrap: wrap;
        margin-bottom: 20px;
      }
      .chip {
        font-family: 'Jua', sans-serif;
        font-size: 15px;
        color: var(--dim);
        background: #fff;
        border: 2px solid var(--line);
        border-radius: 999px;
        padding: 9px 20px;
        cursor: pointer;
      }
      .chip.on {
        background: var(--coral);
        color: #fff;
        border-color: var(--coral);
      }

      .drawbtn {
        display: block;
        margin: 0 auto;
        font-family: 'Jua', sans-serif;
        font-size: 22px;
        color: #fff;
        background: var(--coral);
        border: none;
        padding: 15px 50px;
        border-radius: 999px;
        cursor: pointer;
        box-shadow: 0 6px 0 var(--coral2);
      }

      .stage-label {
        font-family: 'Jua', sans-serif;
        text-align: center;
        font-size: 14px;
        color: var(--dim);
        margin: 26px 0 14px;
      }
      .balls {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 13px;
        flex-wrap: wrap;
      }
      .ball {
        width: 60px;
        height: 60px;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        font-family: 'Jua', sans-serif;
        font-size: 24px;
        color: #5a4a20;
        position: relative;
        box-shadow:
          inset -4px -6px 10px rgba(0, 0, 0, 0.16),
          inset 4px 4px 8px rgba(255, 255, 255, 0.7),
          0 5px 12px rgba(150, 120, 90, 0.3);
      }
      .ball::before {
        content: '';
        position: absolute;
        top: 9px;
        left: 13px;
        width: 15px;
        height: 10px;
        background: rgba(255, 255, 255, 0.75);
        border-radius: 50%;
        filter: blur(1.5px);
      }
      .ball.z1 {
        background: radial-gradient(circle at 35% 30%, #ffe7a8, var(--z1));
      }
      .ball.z2 {
        background: radial-gradient(circle at 35% 30%, #c3e7f4, var(--z2));
        color: #1d5066;
      }
      .ball.z3 {
        background: radial-gradient(circle at 35% 30%, #ffc9c9, var(--z3));
        color: #7a3030;
      }
      .ball.z4 {
        background: radial-gradient(circle at 35% 30%, #e3dac9, var(--z4));
        color: #4a4030;
      }
      .ball.z5 {
        background: radial-gradient(circle at 35% 30%, #d3edbb, var(--z5));
        color: #3f5a26;
      }
      .plus {
        font-family: 'Jua', sans-serif;
        font-size: 26px;
        color: var(--dim);
      }
      .savebtn {
        display: block;
        margin: 24px auto 0;
        font-family: 'Jua', sans-serif;
        font-size: 15px;
        color: var(--coral2);
        background: #fff;
        border: 2px solid var(--coral);
        padding: 9px 26px;
        border-radius: 999px;
        cursor: pointer;
      }

      .sec {
        max-width: 760px;
        margin: 34px auto 0;
      }
      .sec-title {
        font-family: 'Jua', sans-serif;
        font-size: 24px;
        text-align: center;
      }
      .sec-sub {
        color: var(--dim);
        font-size: 13px;
        text-align: center;
        margin-bottom: 22px;
      }
      .grid {
        display: grid;
        grid-template-columns: repeat(2, 1fr);
        gap: 9px 24px;
      }
      .frow {
        display: grid;
        grid-template-columns: 30px 1fr 28px;
        align-items: center;
        gap: 11px;
      }
      .fnum {
        font-family: 'Jua', sans-serif;
        font-size: 14px;
        color: var(--dim);
        text-align: right;
      }
      .ftrack {
        display: block;
        height: 14px;
        background: var(--cream);
        border: 1.5px solid var(--line);
        border-radius: 999px;
        overflow: hidden;
      }
      .fbar {
        display: block;
        height: 100%;
        background: var(--coral);
        border-radius: 999px;
      }
      .fcnt {
        font-family: 'Jua', sans-serif;
        font-size: 13px;
        color: var(--coral2);
        text-align: right;
      }

      .shead {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-bottom: 16px;
      }
      .clear {
        font-size: 13px;
        color: var(--dim);
        background: #fff;
        border: 1.5px solid var(--line);
        padding: 6px 14px;
        border-radius: 999px;
        cursor: pointer;
      }
      .srow {
        display: flex;
        align-items: center;
        gap: 14px;
        background: var(--cream2);
        border: 1.5px solid var(--line);
        border-radius: 18px;
        padding: 12px 18px;
        margin-bottom: 10px;
      }
      .smode {
        font-family: 'Jua', sans-serif;
        font-size: 12px;
        color: var(--coral2);
        background: #fff;
        border-radius: 999px;
        padding: 3px 12px;
        flex: none;
      }
      .ball.sm {
        width: 38px;
        height: 38px;
        font-size: 15px;
      }
      .sdel {
        margin-left: auto;
        font-size: 13px;
        color: var(--dim);
        background: none;
        border: none;
        cursor: pointer;
      }
      .foot {
        height: 50px;
      }
    </style>
  </head>
  <body>
    <div class="disc">
      <span>🍀 재미로 즐기는 도구예요.</span><b>당첨을 보장하지 않으며</b
      ><span>빈도 통계는 예측이 아닙니다.</span>
    </div>

    <section class="hero">
      <span class="badge">✦ 오늘의 행운 번호 ✦</span>
      <h1 class="htitle">로또 <span class="n">6/45</span></h1>
      <p class="hsub">
        과거에 자주 나온 번호, 가볍게 구경하고 한 번 뽑아볼까요?
      </p>
    </section>

    <div class="card">
      <div class="modechips">
        <span class="chip on">순수 랜덤</span>
        <span class="chip">자주 나온 번호</span>
        <span class="chip">드물게 나온 번호</span>
      </div>
      <button class="drawbtn">번호 뽑기</button>

      <div class="stage-label">— 이번에 뽑힌 번호 —</div>
      <div class="balls">
        <span class="ball z1">7</span><span class="ball z2">12</span
        ><span class="ball z3">23</span> <span class="ball z4">31</span
        ><span class="ball z4">38</span><span class="ball z5">42</span>
        <span class="plus">+</span><span class="ball z2">15</span>
      </div>
      <button class="savebtn">이 번호 저장하기</button>
    </div>

    <section class="sec">
      <h2 class="sec-title">번호별 출현 빈도</h2>
      <p class="sec-sub">샘플 30회차 기준 · 실제 당첨번호 아님</p>
      <div class="card" style="margin-top: 0">
        <div class="grid">
          <div class="frow">
            <span class="fnum">01</span
            ><span class="ftrack"
              ><span class="fbar" style="width: 75%"></span></span
            ><span class="fcnt">12</span>
          </div>
          <div class="frow">
            <span class="fnum">02</span
            ><span class="ftrack"
              ><span class="fbar" style="width: 44%"></span></span
            ><span class="fcnt">7</span>
          </div>
          <div class="frow">
            <span class="fnum">03</span
            ><span class="ftrack"
              ><span class="fbar" style="width: 100%"></span></span
            ><span class="fcnt">16</span>
          </div>
          <div class="frow">
            <span class="fnum">04</span
            ><span class="ftrack"
              ><span class="fbar" style="width: 31%"></span></span
            ><span class="fcnt">5</span>
          </div>
          <div class="frow">
            <span class="fnum">05</span
            ><span class="ftrack"
              ><span class="fbar" style="width: 62%"></span></span
            ><span class="fcnt">10</span>
          </div>
          <div class="frow">
            <span class="fnum">06</span
            ><span class="ftrack"
              ><span class="fbar" style="width: 50%"></span></span
            ><span class="fcnt">8</span>
          </div>
          <div class="frow">
            <span class="fnum">07</span
            ><span class="ftrack"
              ><span class="fbar" style="width: 88%"></span></span
            ><span class="fcnt">14</span>
          </div>
          <div class="frow">
            <span class="fnum">08</span
            ><span class="ftrack"
              ><span class="fbar" style="width: 25%"></span></span
            ><span class="fcnt">4</span>
          </div>
          <div class="frow">
            <span class="fnum">09</span
            ><span class="ftrack"
              ><span class="fbar" style="width: 56%"></span></span
            ><span class="fcnt">9</span>
          </div>
          <div class="frow">
            <span class="fnum">10</span
            ><span class="ftrack"
              ><span class="fbar" style="width: 69%"></span></span
            ><span class="fcnt">11</span>
          </div>
        </div>
      </div>
    </section>

    <section class="sec">
      <div class="shead">
        <h2 class="sec-title" style="margin: 0">저장한 번호</h2>
        <button class="clear">전체 비우기</button>
      </div>
      <div class="srow">
        <span class="smode">자주 위주</span>
        <span class="balls" style="justify-content: flex-start; gap: 7px">
          <span class="ball sm z1">3</span><span class="ball sm z2">11</span
          ><span class="ball sm z3">27</span> <span class="ball sm z4">33</span
          ><span class="ball sm z5">41</span><span class="ball sm z5">44</span>
          <span class="plus" style="font-size: 18px">+</span
          ><span class="ball sm z1">9</span> </span
        ><button class="sdel">삭제</button>
      </div>
      <div class="srow">
        <span class="smode">순수 랜덤</span>
        <span class="balls" style="justify-content: flex-start; gap: 7px">
          <span class="ball sm z1">5</span><span class="ball sm z2">18</span
          ><span class="ball sm z3">21</span> <span class="ball sm z3">29</span
          ><span class="ball sm z4">36</span><span class="ball sm z5">43</span>
          <span class="plus" style="font-size: 18px">+</span
          ><span class="ball sm z2">14</span> </span
        ><button class="sdel">삭제</button>
      </div>
    </section>
    <div class="foot"></div>
  </body>
</html>
